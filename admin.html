<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SollBites - Admin Panel</title>
    <!-- We don't link style.css here to avoid conflicts, we use admin.css entirely for layout -->
    <link rel="stylesheet" href="admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="admin-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <img src="logo.png" alt="SB" style="height: 28px; margin-right: 12px;">
                <span class="logo-text">SollBites <span class="text-yellow">Admin</span></span>
            </div>
            
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" id="nav-orders" onclick="switchTab('orders')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <path d="M16 10a4 4 0 0 1-8 0"></path>
                    </svg>
                    Orders
                </a>
                <a href="#" class="nav-item" id="nav-menu" onclick="switchTab('menu')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 8h1a4 4 0 0 1 0 8h-1"></path>
                        <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path>
                        <line x1="6" y1="1" x2="6" y2="4"></line>
                        <line x1="10" y1="1" x2="10" y2="4"></line>
                        <line x1="14" y1="1" x2="14" y2="4"></line>
                    </svg>
                    Add Menu
                </a>
            </nav>
            
            <a href="index.html" class="nav-item logout-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Logout
            </a>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Orders Tab -->
            <div id="content-orders" class="tab-content active">
                <div class="page-header">
                    <div>
                        <h1>Orders</h1>
                        <p>Manage all confirmed orders</p>
                    </div>
                    <div class="date-picker">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="6"></line>
                            <line x1="8" y1="2" x2="8" y2="6"></line>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                        </svg>
                        <span>24 May 2024</span>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </div>
                </div>
                
                <div class="table-container">
                    <table class="orders-table">
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Customer Name</th>
                                <th>Address</th>
                                <th>Items</th>
                                <th>Total</th>
                                <th>Status</th>
                                <th>Order Time</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="orders-tbody">
                            <!-- Injected by JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Add Menu Tab -->
            <div id="content-menu" class="tab-content" style="display: none;">
                <div class="page-header">
                    <div>
                        <h1>Add Menu</h1>
                        <p>Add a new menu item to the menu</p>
                    </div>
                </div>
                
                <div class="add-menu-layout">
                    <div class="form-column">
                        <div class="form-group">
                            <label>Product Name</label>
                            <input type="text" id="new-item-name" placeholder="Enter product name">
                        </div>
                        <div class="form-group">
                            <label>Price (₹)</label>
                            <input type="number" id="new-item-price" placeholder="Enter price">
                        </div>
                        <div class="form-group">
                            <label>Category (Optional)</label>
                            <div class="select-wrapper">
                                <select id="new-item-category">
                                    <option value="" disabled selected>Select category</option>
                                    <option value="burgers">Burgers</option>
                                    <option value="pizzas">Pizzas</option>
                                    <option value="drinks">Drinks</option>
                                    <option value="sides">Sides</option>
                                </select>
                                <svg class="select-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="6 9 12 15 18 9"></polyline>
                                </svg>
                            </div>
                        </div>
                        <button class="add-product-btn" onclick="addNewDish()">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                            Add Product
                        </button>
                    </div>
                    <div class="image-column">
                        <label>Product Image</label>
                        <div class="upload-box" id="upload-box">
                            <div class="upload-content">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#a0a0a0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 12px;">
                                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                    <polyline points="21 15 16 10 5 21"></polyline>
                                </svg>
                                <p style="color: #fff; font-weight: 500; font-size: 14px; margin-bottom: 4px;">Click to upload image</p>
                                <p style="color: #8c8c8c; font-size: 13px; margin-bottom: 4px;">or drag and drop</p>
                                <p style="color: #555; font-size: 12px;">PNG, JPG up to 5MB</p>
                            </div>
                            <input type="file" id="new-item-image-file" accept="image/*" class="file-input">
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="admin.js"></script>
</body>
</html>
