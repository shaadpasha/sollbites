<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SollBites - Order</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="order.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <!-- Logo -->
        <a href="index.html" class="logo">
            <img src="logo.png" alt="SollBites Logo">
        </a>
        
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="order.html" class="active">Order</a>
            <a href="about.html">About Us</a>
            <a href="contact.html">Contact</a>
        </nav>
        
        <div class="header-actions">
            <button class="icon-btn search-btn" aria-label="Search">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
            <button class="cart-btn" onclick="window.location.href='cart.html'">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="bag-icon">
                    <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <path d="M16 10a4 4 0 0 1-8 0"></path>
                </svg>
                <span>0 | My Order</span>
            </button>
        </div>
    </header>

    <main class="order-container">
        <div class="order-header">
            <h1 class="page-title">Explore Our Menu</h1>
            <p class="page-subtitle">Fresh, delicious, and delivered straight to your door.</p>
        </div>
        
        <div class="product-grid" id="product-grid">
            <!-- Products will be generated by order.js for cleaner code, but we define the structure there -->
        </div>
    </main>

    <script src="order.js"></script>
</body>
</html>
